<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Manager - মেনু সংস্করণ</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1400px;
            margin: auto;
            padding: 20px;
            background: #f4f7fc;
        }
        h1 { color: #2c3e50; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        /* ফর্ম কার্ড - ডিফল্ট লুকানো */
        #formCard {
            display: none;
        }
        #formCard.show {
            display: block;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
            margin-top: 5px;
        }
        button:hover { opacity: 0.9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-success { background-color: #2ecc71; }
        .btn-warning { background-color: #f39c12; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-call { background-color: #2c3e50; }
        .btn-new {
            background-color: #2ecc71;
            font-size: 16px;
            padding: 10px 20px;
            margin-bottom: 15px;
            border: none;
            cursor: pointer;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            border-radius: 30px;
            border: 1px solid #ccc;
        }
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filters select {
            width: auto;
            min-width: 120px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: left;
            vertical-align: middle;
        }
        th {
            background-color: #2c3e50;
            color: white;
            position: sticky;
            top: 0;
        }
        .action-buttons {
            position: relative;
            text-align: center;
        }
        .kebab-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 0 8px;
            color: #2c3e50;
        }
        .dropdown-menu {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 100;
            min-width: 140px;
            right: 0;
            top: 100%;
            display: none;
        }
        .dropdown-menu button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 8px 12px;
            margin: 0;
            color: #2c3e50;
            font-size: 14px;
        }
        .dropdown-menu button:hover {
            background-color: #f0f0f0;
        }
        .highlight {
            background-color: yellow;
        }
        .export-import {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        @media (max-width: 700px) {
            .form-row { flex-direction: column; }
            .filters { flex-direction: column; }
            th, td { font-size: 12px; }
        }
    </style>
</head>
<body>
<h1>📋 People Manager</h1>

<!-- বাটন: নতুন সদস্য যোগ -->
<button id="toggleFormBtn" class="btn-new">➕ নতুন সদস্য যোগ করুন</button>

<!-- ফর্ম কার্ড (লুকানো) -->
<div id="formCard" class="card">
    <h2 id="formTitle">➕ নতুন সদস্য যোগ করুন</h2>
    <form id="peopleForm">
        <div class="form-row">
            <div class="form-group"><label>নাম *</label><input type="text" id="name" required></div>
            <div class="form-group"><label>ফোন *</label><input type="tel" id="phone" required></div>
            <div class="form-group"><label>এলাকা</label><input type="text" id="area"></div>
            <div class="form-group"><label>রোল</label><input type="text" id="role"></div>
            <div class="form-group"><label>ক্লাস্টার</label><input type="text" id="cluster"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>নোট</label><textarea id="note" rows="2"></textarea></div>
        </div>
        <div>
            <button type="submit" class="btn-success" id="submitBtn">➕ যোগ করুন</button>
            <button type="button" id="cancelEditBtn" style="display:none;">বাতিল করুন</button>
        </div>
        <input type="hidden" id="editId" value="">
    </form>
</div>

<!-- সার্চ ও ফিল্টার -->
<div class="card">
    <input type="text" id="searchBox" class="search-box" placeholder="🔍 যেকোনো কিছু লিখুন (নাম, ফোন, এলাকা, নোট...)" autocomplete="off">
    <div class="filters">
        <select id="filterRole"><option value="">সব রোল</option></select>
        <select id="filterArea"><option value="">সব এলাকা</option></select>
        <select id="filterCluster"><option value="">সব ক্লাস্টার</option></select>
    </div>
    <div class="export-import">
        <button id="exportBtn" class="btn-warning">📁 JSON এক্সপোর্ট</button>
        <label for="importFile" class="btn" style="background:#95a5a6; padding:8px 16px; border-radius:6px; cursor:pointer;">📂 JSON ইমপোর্ট</label>
        <input type="file" id="importFile" accept=".json" style="display:none;">
        <button id="resetDataBtn" class="btn-danger">🔄 ডিফল্ট ডেটা রিসেট</button>
    </div>
    <div id="resultsCount"></div>
    <div style="overflow-x: auto;">
        <table id="peopleTable">
            <thead>
                <tr><th>ID</th><th>নাম</th><th>ফোন</th><th>এলাকা</th><th>রোল</th><th>ক্লাস্টার</th><th>নোট</th><th style="width:60px"></th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script>
    // ---------- ডিফল্ট ডেটা ----------
    const DEFAULT_DATA = [
        { id: 1, name: "রহিম মিয়া", phone: "01711111111", area: "ঢাকা", role: "সদস্য", cluster: "উত্তর", note: "সক্রিয়" },
        { id: 2, name: "করিমা বেগম", phone: "01822222222", area: "চট্টগ্রাম", role: "নেত্রী", cluster: "দক্ষিণ", note: "নতুন যোগদান" }
    ];

    let peopleData = [];
    let fuseInstance = null;

    // ---------- localStorage ----------
    function loadDataFromStorage() {
        const stored = localStorage.getItem('peopleManagerData');
        if (stored) {
            peopleData = JSON.parse(stored);
        } else {
            peopleData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            saveToStorage();
        }
        peopleData.sort((a,b) => a.id - b.id);
        rebuildFuse();
        populateFilters();
        renderTable();
    }

    function saveToStorage() {
        localStorage.setItem('peopleManagerData', JSON.stringify(peopleData));
    }

    function rebuildFuse() {
        fuseInstance = new Fuse(peopleData, {
            keys: ['name', 'phone', 'area', 'role', 'cluster', 'note'],
            threshold: 0.3,
            includeMatches: true
        });
    }

    function populateFilters() {
        const roles = [...new Set(peopleData.map(p => p.role).filter(r => r && r.trim() !== ""))];
        const areas = [...new Set(peopleData.map(p => p.area).filter(a => a && a.trim() !== ""))];
        const clusters = [...new Set(peopleData.map(p => p.cluster).filter(c => c && c.trim() !== ""))];
        const roleSelect = document.getElementById('filterRole');
        const areaSelect = document.getElementById('filterArea');
        const clusterSelect = document.getElementById('filterCluster');
        roleSelect.innerHTML = '<option value="">সব রোল</option>';
        areaSelect.innerHTML = '<option value="">সব এলাকা</option>';
        clusterSelect.innerHTML = '<option value="">সব ক্লাস্টার</option>';
        roles.forEach(r => { let opt = document.createElement('option'); opt.value = r; opt.text = r; roleSelect.appendChild(opt); });
        areas.forEach(a => { let opt = document.createElement('option'); opt.value = a; opt.text = a; areaSelect.appendChild(opt); });
        clusters.forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.text = c; clusterSelect.appendChild(opt); });
    }

    function getFilteredData() {
        const query = document.getElementById('searchBox').value.trim();
        let filtered = peopleData;
        if (query !== "") {
            const fuseResults = fuseInstance.search(query);
            filtered = fuseResults.map(r => r.item);
        }
        const role = document.getElementById('filterRole').value;
        const area = document.getElementById('filterArea').value;
        const cluster = document.getElementById('filterCluster').value;
        if (role) filtered = filtered.filter(p => p.role === role);
        if (area) filtered = filtered.filter(p => p.area === area);
        if (cluster) filtered = filtered.filter(p => p.cluster === cluster);
        return filtered;
    }

    // ড্রপডাউন মেনু বন্ধ করার জন্য গ্লোবাল ক্লিক হ্যান্ডলার
    function closeAllDropdowns() {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            menu.style.display = 'none';
        });
    }

    function renderTable() {
        const filtered = getFilteredData();
        const tbody = document.querySelector('#peopleTable tbody');
        const countDiv = document.getElementById('resultsCount');
        countDiv.innerHTML = `${filtered.length} টি ফলাফল পাওয়া গেছে`;
        tbody.innerHTML = '';
        const query = document.getElementById('searchBox').value.trim();
        filtered.forEach(person => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = person.id;
            row.insertCell(1).innerHTML = highlightText(person.name || '', query);
            row.insertCell(2).innerHTML = highlightText(person.phone || '', query);
            row.insertCell(3).innerHTML = highlightText(person.area || '', query);
            row.insertCell(4).innerHTML = highlightText(person.role || '', query);
            row.insertCell(5).innerHTML = highlightText(person.cluster || '', query);
            row.insertCell(6).innerHTML = highlightText(person.note || '', query);
            const actionCell = row.insertCell(7);
            actionCell.className = 'action-buttons';
            
            // তিন বিন্দু বাটন
            const kebab = document.createElement('button');
            kebab.textContent = '⋮';
            kebab.className = 'kebab-btn';
            const dropdown = document.createElement('div');
            dropdown.className = 'dropdown-menu';
            // কল অপশন
            const callOpt = document.createElement('button');
            callOpt.textContent = '📞 কল';
            callOpt.onclick = (e) => { e.stopPropagation(); window.location.href = `tel:${person.phone}`; closeAllDropdowns(); };
            // হোয়াটসঅ্যাপ
            const waOpt = document.createElement('button');
            waOpt.textContent = '💬 হোয়াটসঅ্যাপ';
            waOpt.onclick = (e) => { e.stopPropagation(); let num = person.phone.replace(/\D/g,''); if(!num.startsWith('88')) num='88'+num; window.open(`https://wa.me/${num}`,'_blank'); closeAllDropdowns(); };
            // এডিট
            const editOpt = document.createElement('button');
            editOpt.textContent = '✏️ এডিট';
            editOpt.onclick = (e) => { e.stopPropagation(); loadPersonToForm(person); closeAllDropdowns(); };
            // ডিলিট
            const delOpt = document.createElement('button');
            delOpt.textContent = '🗑️ ডিলিট';
            delOpt.onclick = (e) => { e.stopPropagation(); deletePerson(person.id); closeAllDropdowns(); };
            dropdown.appendChild(callOpt);
            dropdown.appendChild(waOpt);
            dropdown.appendChild(editOpt);
            dropdown.appendChild(delOpt);
            actionCell.appendChild(kebab);
            actionCell.appendChild(dropdown);
            
            // টগল ড্রপডাউন
            kebab.onclick = (e) => {
                e.stopPropagation();
                closeAllDropdowns();
                dropdown.style.display = 'block';
            };
        });
    }

    // ডকুমেন্টে ক্লিক করলে সব ড্রপডাউন বন্ধ
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.dropdown-menu') && !e.target.closest('.kebab-btn')) {
            closeAllDropdowns();
        }
    });

    function highlightText(text, query) {
        if (!query || query === "" || !text) return text || '';
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, `<span class="highlight">$1</span>`);
    }

    // ফর্ম টগল
    function toggleForm(show = null) {
        const formCard = document.getElementById('formCard');
        if (show === true) formCard.classList.add('show');
        else if (show === false) formCard.classList.remove('show');
        else formCard.classList.toggle('show');
        if (formCard.classList.contains('show')) {
            document.getElementById('name').focus();
        }
    }

    // সেভ ও এডিট
    function savePerson(event) {
        event.preventDefault();
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        if (!name || !phone) {
            alert('নাম এবং ফোন অবশ্যই দিতে হবে');
            return;
        }
        const area = document.getElementById('area').value.trim();
        const role = document.getElementById('role').value.trim();
        const cluster = document.getElementById('cluster').value.trim();
        const note = document.getElementById('note').value.trim();
        const editId = document.getElementById('editId').value;

        if (editId === "") {
            const newId = peopleData.length > 0 ? Math.max(...peopleData.map(p => p.id)) + 1 : 1;
            peopleData.push({ id: newId, name, phone, area, role, cluster, note });
        } else {
            const index = peopleData.findIndex(p => p.id == editId);
            if (index !== -1) {
                peopleData[index] = { ...peopleData[index], name, phone, area, role, cluster, note };
            }
            resetFormToAddMode();
        }
        saveToStorage();
        rebuildFuse();
        populateFilters();
        renderTable();
        resetFormToAddMode();
        toggleForm(false); // যোগ/আপডেট শেষে ফর্ম লুকান
    }

    function loadPersonToForm(person) {
        document.getElementById('name').value = person.name;
        document.getElementById('phone').value = person.phone;
        document.getElementById('area').value = person.area || '';
        document.getElementById('role').value = person.role || '';
        document.getElementById('cluster').value = person.cluster || '';
        document.getElementById('note').value = person.note || '';
        document.getElementById('editId').value = person.id;
        document.getElementById('formTitle').innerHTML = '✏️ সদস্য এডিট করুন';
        document.getElementById('submitBtn').innerHTML = '💾 আপডেট করুন';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        toggleForm(true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetFormToAddMode() {
        document.getElementById('peopleForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('formTitle').innerHTML = '➕ নতুন সদস্য যোগ করুন';
        document.getElementById('submitBtn').innerHTML = '➕ যোগ করুন';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function deletePerson(id) {
        if (confirm('আপনি কি এই সদস্যকে ডিলিট করতে চান?')) {
            peopleData = peopleData.filter(p => p.id !== id);
            saveToStorage();
            rebuildFuse();
            populateFilters();
            renderTable();
            if (document.getElementById('editId').value == id) resetFormToAddMode();
        }
    }

    // ইমপোর্ট/এক্সপোর্ট/রিসেট
    function exportToJSON() {
        const dataStr = JSON.stringify(peopleData, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'people_backup.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function importFromJSON(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    peopleData = imported;
                    peopleData.forEach((p, idx) => { if (!p.id) p.id = idx+1; });
                    saveToStorage();
                    rebuildFuse();
                    populateFilters();
                    renderTable();
                    alert('ডেটা সফলভাবে ইমপোর্ট হয়েছে');
                } else throw new Error('Invalid format');
            } catch(err) {
                alert('ভুল JSON ফাইল। সঠিক ফরম্যাট: peopleData অ্যারে');
            }
        };
        reader.readAsText(file);
    }

    function resetToDefault() {
        if (confirm('সমস্ত ডেটা ডিফল্টে রিসেট হবে। আপনার করা পরিবর্তন হারাবে। নিশ্চিত?')) {
            peopleData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            saveToStorage();
            rebuildFuse();
            populateFilters();
            renderTable();
            resetFormToAddMode();
            toggleForm(false);
        }
    }

    // ইভেন্ট লিসেনার
    document.getElementById('toggleFormBtn').addEventListener('click', () => toggleForm());
    document.getElementById('peopleForm').addEventListener('submit', savePerson);
    document.getElementById('cancelEditBtn').addEventListener('click', () => { resetFormToAddMode(); toggleForm(false); });
    document.getElementById('searchBox').addEventListener('input', () => renderTable());
    document.getElementById('filterRole').addEventListener('change', () => renderTable());
    document.getElementById('filterArea').addEventListener('change', () => renderTable());
    document.getElementById('filterCluster').addEventListener('change', () => renderTable());
    document.getElementById('exportBtn').addEventListener('click', exportToJSON);
    document.getElementById('importFile').addEventListener('change', (e) => {
        if (e.target.files.length) importFromJSON(e.target.files[0]);
        e.target.value = '';
    });
    document.getElementById('resetDataBtn').addEventListener('click', resetToDefault);

    // শুরু
    loadDataFromStorage();
</script>
</body>
</html>
